# ═══════════════════════════════════════════════════════════════════════════
# application.yml -- NutritionCoach configuration
# ═══════════════════════════════════════════════════════════════════════════
#
# MERN/Next.js analogy:
#   This file is the combined equivalent of:
#     .env              <- environment variables (api keys, db urls)
#     next.config.js    <- framework-level configuration
#     config/*.ts       <- app-level settings modules
#
#   Spring Boot reads this file at startup and makes every property available
#   via @Value("${some.property}") injection or auto-configuration bindings.
#   The ${GEMINI_API_KEY} syntax is exactly like process.env.GEMINI_API_KEY in Node.
#
#   Spring profiles (application-prod.yml, application-dev.yml) are equivalent
#   to Next.js's .env.production / .env.development files.
#
# Book ref: Chapter 2 -- Choosing a Provider & Model
#   The model name is externalised here so you can swap models without
#   touching source code -- a key practice recommended in the book.
# ═══════════════════════════════════════════════════════════════════════════

spring:
  application:
    name: nutrition-coach

  # ── Spring AI – Gemini via Google AI Studio OpenAI-compatible endpoint ──
  # Spring AI 1.0.0 has no native Google AI Studio starter, but Google AI
  # Studio exposes an OpenAI-compatible API -- we simply point the OpenAI
  # client at it.  No GCP project required; just a Google AI Studio key.
  #
  # MERN/Next.js analogy:
  #   This is equivalent to:
  #     const openai = createOpenAI({
  #       apiKey: process.env.GEMINI_API_KEY,
  #       baseURL: 'https://generativelanguage.googleapis.com/v1beta/models',
  #     })
  #
  # Book ref: Chapter 2 -- Choosing a Provider & Model
  ai:
    openai:
      api-key: ${GEMINI_API_KEY}     # export GEMINI_API_KEY=<your Google AI Studio key>
      # Google AI Studio exposes an OpenAI-compatible endpoint under /v1beta/openai.
      # Spring AI's OpenAI client appends its default completionsPath (/v1/chat/completions)
      # to base-url, which would produce .../openai/v1/chat/completions -- a 404.
      # We override completions-path to /chat/completions so the final URL is correct:
      #   https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
      # MERN analogy: like setting baseURL on the Vercel AI SDK createOpenAI() call.
      base-url: https://generativelanguage.googleapis.com/v1beta/openai
      chat:
        completions-path: /chat/completions   # strips the default /v1 prefix
        options:
          model: gemini-2.5-flash            # confirmed working; swap back to 2.0-flash if quota resets
          temperature: 0.7

  # ── Database – H2 in-memory for Phase 0-3 ────────────────────────────────
  #
  # MERN analogy: like using an in-memory MongoDB mock (mongodb-memory-server)
  # for local development before connecting to a real Atlas cluster.
  # H2 is a pure-Java embedded SQL database, zero config needed.
  # Switch to PostgreSQL in Phase 10 by changing the url + driver below.
  datasource:
    url: jdbc:h2:mem:nutritioncoach;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''

  h2:
    console:
      enabled: true            # browse at http://localhost:8080/h2-console
      path: /h2-console

  jpa:
    hibernate:
      # Phase 4: Flyway now owns the schema — ddl-auto must be 'none' so
      # Hibernate does NOT auto-create/drop tables on top of Flyway migrations.
      # Phase 3 used 'create-drop' (Hibernate managed everything from @Entity).
      # MERN analogy: like disabling Mongoose's auto-index creation once you
      # manage indexes manually via Atlas / Prisma migrations.
      ddl-auto: none
    show-sql: false
    open-in-view: false        # best practice: avoids lazy-loading traps in web layer

  # ── Flyway — database migrations ──────────────────────────────────────────
  #
  # Flyway is the Java equivalent of Prisma Migrate or Liquibase.
  # It runs SQL scripts in src/main/resources/db/migration/ in version order:
  #   V1__init.sql              — create conversation_message, user_profile, agent_note
  #   V2__agent_note_dedup.sql  — add UNIQUE(user_id, content) on agent_note
  #
  # MERN analogy:
  #   In Prisma you'd run: npx prisma migrate deploy
  #   Flyway does the same automatically at application startup.
  #   The migration files are the equivalent of .sql files in prisma/migrations/.
  #
  # Book ref: Chapter 7 — Memory
  #   Persistent schema management is the foundation of long-term memory.
  #   Flyway's versioned scripts ensure every environment (dev, staging, prod)
  #   runs the exact same schema evolution path.
  flyway:
    enabled: true
    locations: classpath:db/migration

# ── Embabel Agent Platform ───────────────────────────────────────────────
# MERN analogy: equivalent of `new Mastra({ agents: [...] })` configuration.
# Embabel auto-discovers @Agent beans from the classpath; these settings
# control which LLM is used as the default for all @Action method calls.
#
# embabel.models.default-llm must match the model name registered by
# embabel-agent-starter-openai.  That starter reads Spring AI's OpenAI
# configuration and registers an Embabel Llm bean named after the model.
# Since spring.ai.openai.chat.options.model = gemini-2.5-flash above, the
# Llm bean's name is gemini-2.5-flash -- so we reference it here.
#
# Book ref: Chapter 2 -- Choosing a Provider & Model
#   Externalising the model name means you can swap models without touching
#   any Java code -- a key practice recommended in the book.
embabel:
  models:
    default-llm: gemini-2.5-flash    # must match a GeminiModels constant name
  agent:
    logging:
      personality: none              # disable Star Wars logging theme in dev

# ── Actuator ─────────────────────────────────────────────────────────────
# MERN analogy: like a built-in /healthz endpoint that also exposes metrics.
# Spring Boot Actuator provides /actuator/health, /actuator/metrics, etc.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

# ── App-level config (grows per phase) ────────────────────────────────────
# MERN analogy: a config module (config/ai.ts) that is imported by services.
# These values are injected via @Value or @ConfigurationProperties in Phase 7+.
app:
  agent:
    model:
      free: gemini-2.0-flash          # Book ref: Ch 8 -- dynamic agent model selection
      premium: gemini-1.5-pro
    memory:
      window-size: 8                  # Book ref: Ch 7 -- short-term memory window
  guardrail:
    # Phase 6: set to true to enable all guardrails (input sanitisation,
    # API key auth, rate limiting, output moderation, CriticAgent retry).
    # In dev, keep true and use the default api-key below.
    # Book ref: Chapter 9 — Middleware & Guardrails
    enabled: true
    # API key required in X-Api-Key header.  Set NUTRITION_API_KEY env var in prod.
    # MERN analogy: process.env.API_KEY in a Next.js middleware.ts file.
    api-key: ${NUTRITION_API_KEY:dev-key}
    rate-limit:
      # Max requests per userId per 60-second rolling window.
      # Book ref: Chapter 9 — rate limiting protects against LLM cost runaway.
      requests-per-minute: 10
    critic:
      # CriticAgent score threshold: scores below this trigger a coaching retry.
      # Book ref: Chapter 28 — Writing LLM Evals (threshold-based retry loop).
      score-threshold: 40
      max-retries: 1

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    com.nutritioncoach: DEBUG
    org.springframework.ai: DEBUG     # shows full prompt/response in dev
